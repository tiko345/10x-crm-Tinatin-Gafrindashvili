<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <!-- aside placeholder -->
    <aside id="aside-placeholder"></aside>

    <main class="dashboard">
        <section class="heading">
            <h1>Welcome Back</h1>
            <div class="clock" id="clock"></div>
        </section>
        <section class="stat-cards">
            <div class="stat-cards">
                <h3>Total Clients</h3>
                <p id="total-clients">0</p>
            </div>
            <div class="stat-cards">
                <h3>Active Deals</h3>
                <p id="active-deals">0</p>
            </div>
            <div class="stat-cards">
                <h3>Won Revenue</h3>
                <p id="won-revenue">0</p>
            </div>
            <div class="stat-cards">
                <h3>New This Week</h3>
                <p id="new-this-week">0</p>
            </div>
        </section>
        <section class="pipeline-overview">
            <h2>Pipeline Overview</h2>
            <div class="pipeline-stages">
                <div class="stage">
                <h4>Lead</h4>
                <p id="lead-count">0</p>
                </div>
                <div class="stage">
                <h4>Contacted</h4>
                <p id="contacted-count">0</p>
                </div>
                <div class="stage">
                <h4>Won</h4>
                <p id="won-count">0</p>
                </div>
                <div class="stage">
                <h4>Lost</h4>
                <p id="lost-count">0</p>
                </div>
            </div>
        </section>
        <section class="recent-clients">
            <h2>Recent Clients</h2>
            <div id="recent-clients-list" class="clients-list">
                <!-- Recent clients will be dynamically inserted here -->
            </div>
            <a href="clients.html" class="view-all-link">View all clients →</a>
        </section>
    </main>

    <script src="./js/load-aside.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/dashboard.js"></script>
    <script src="./js/theme.js"></script>
</body>
