<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10x CRM</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="light content">
    <!-- aside placeholder -->
    <aside id="aside-placeholder"></aside>

    <main class="main-content">
        <div class="theme-toggle-cont">
            <a href="#" id="theme-toggle">
                <img src="./assets/sleep-mode.svg" alt="theme icon" id="theme-icon">
            </a>
        </div>
        <div class="profile-container">
            <div class="info-block">
                <div class="avatar">
                    <span id="avatar-initials"></span>
                </div>
                <div class="user-info">
                    <h2 id="user-fullname"></h2>
                    <p id="user-email"></p>
                    <div class="account-info">
                        <p>company:<span id="user-company"></span></p>
                        <p>Member since:<span id="user-member-since"></span></p>
                    </div>
                </div>
            </div>

            <div class="edit-profile-form">
                <h3>Edit Profile</h3>
                <form id="edit-profile-form">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required>
                        <span class="error-message" id="fullname-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="company">Company</label>
                        <input type="text" id="company" name="company">
                    </div>
                    <button type="submit" id="save-changes-btn">Save Changes</button>
                </form>
            </div>

            <div class="change-password-form">
                <h3>Change Password</h3>
                <form id="change-password-form">
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <input type="password" id="current-password" name="current-password" required>
                        <span class="error-message" id="current-password-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="new-password" required>
                        <span class="error-message" id="new-password-error"></span>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm New Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                        <span class="error-message" id="confirm-password-error"></span>
                    </div>
                    <button type="submit" id="change-password-btn">Change Password</button>
                </form>
            </div>

            <div class="reset-data-section">
                <h3>Data Management</h3>
                <button id="reset-crm-data-btn">Reset CRM Data</button>
            </div>
        </div>
    </main>
    <script src="./js/auth.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/aside.js"></script>
    <script src="./js/profile.js"></script>
</body>
